services:
  cyber-sentinel:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # For later InfluxDB integration (currently unused by demo store)
      INFLUX_URL: "http://influxdb:8086"
      INFLUX_TOKEN: "${INFLUX_TOKEN:-}"
      INFLUX_ORG: "${INFLUX_ORG:-}"
      INFLUX_BUCKET: "${INFLUX_BUCKET:-}"
    restart: unless-stopped

  # Optional: local InfluxDB for your Pi (enable when you integrate it)
  influxdb:
    image: influxdb:2.7-alpine
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped

volumes:
  influxdb-data:

